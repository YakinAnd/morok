site_name: adpath
site_description: Active Directory Attack Path Enumerator — lightweight CLI for AD security analysis
site_url: https://yakinand.github.io/adpath
repo_url: https://github.com/YakinAnd/adpath
repo_name: YakinAnd/adpath
edit_uri: edit/main/docs/

theme:
  name: material
  palette:
    - scheme: slate
      primary: blue
      accent: light blue
      toggle:
        icon: material/weather-sunny
        name: Switch to light mode
    - scheme: default
      primary: blue
      accent: blue
      toggle:
        icon: material/weather-night
        name: Switch to dark mode
  features:
    - navigation.tabs
    - navigation.sections
    - navigation.top
    - navigation.footer
    - search.highlight
    - search.suggest
    - content.code.copy
    - content.code.annotate
  logo: assets/logo.svg
  favicon: assets/logo.svg
  icon:
    repo: fontawesome/brands/github

plugins:
  - search

markdown_extensions:
  - admonition
  - pymdownx.details
  - pymdownx.superfences
  - pymdownx.highlight:
      anchor_linenums: true
  - pymdownx.inlinehilite
  - pymdownx.tabbed:
      alternate_style: true
  - attr_list
  - tables

nav:
  - Home: index.md
  - Getting Started:
    - Installation: getting-started/install.md
    - Authentication: getting-started/auth.md
    - Quick Start: getting-started/quickstart.md
    - Proxy & Scope: getting-started/proxy-scope.md
    - Shell Completion: getting-started/completion.md
  - Commands:
    - enum: commands/enum.md
    - kerberos: commands/kerberos.md
    - acl: commands/acl.md
    - delegation: commands/delegation.md
    - gpo: commands/gpo.md
    - adcs: commands/adcs.md
    - trust: commands/trust.md
    - shadow: commands/shadow.md
    - audit: commands/audit.md
    - users: commands/users.md
    - computers: commands/computers.md
    - kerb-enum: commands/kerb-enum.md
    - smb: commands/smb.md
  - HTML Report:
    - Overview: report/overview.md
    - Tabs reference: report/tabs.md
  - Attack Techniques:
    - Kerberoasting: techniques/kerberoasting.md
    - AS-REP Roasting: techniques/asreproasting.md
    - ACL Abuse: techniques/acl-abuse.md
    - Delegation Abuse: techniques/delegation.md
    - ADCS (ESC1–ESC13): techniques/adcs.md
    - Trust Attacks: techniques/trusts.md
    - Shadow Credentials: techniques/shadow-credentials.md
    - LDAP Relay: techniques/ldap-relay.md
  - Roadmap: roadmap.md
